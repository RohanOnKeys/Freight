services:
  postgres:
    image: postgres:16
    container_name: freight-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: freight
      POSTGRES_PASSWORD: freight
      POSTGRES_DB: freight

    ports:
      - "5432:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: freight-redis
    restart: unless-stopped

    ports:
      - "6379:6379"

volumes:
  pgdata: